<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JBG Odonto | Dr. Jefferson</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1512; color: #ffffff; }
        .bg-card { background-color: #251f1b; }
        .text-bronze { color: #c5a47e; }
        .btn-gold {
            background: linear-gradient(135deg, #c5a47e 0%, #896d49 100%);
            transition: transform 0.2s;
        }
        .btn-gold:hover { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
</head>
<body class="font-sans antialiased">
    <div class="min-h-screen flex flex-col items-center justify-center px-4 text-center">
        <div class="mb-12">
            <div class="inline-block border-2 border-[#c5a47e] rounded-full p-6 mb-6">
                <h2 class="text-3xl font-serif text-bronze">JBG</h2>
            </div>
            <h1 class="text-3xl md:text-4xl font-light tracking-[0.2em] uppercase mb-2">Dr. Jefferson</h1>
            <p class="text-bronze text-xs md:text-sm tracking-[0.4em] uppercase font-medium">Cirurgião Implantodontista</p>
        </div>
        <div class="bg-card w-full max-w-sm rounded-[2rem] p-10 shadow-2xl border border-[#3d322b]">
            <h3 class="text-xl font-medium mb-1 text-white">Reabilitação Oral</h3>
            <p class="text-gray-500 text-sm mb-8 italic">Especialista em Sorrisos de Alto Padrão</p>
            <div class="space-y-6">
                <a href="https://wa.me/5511999999999" target="_blank" class="btn-gold block w-full py-4 rounded-2xl text-white font-bold tracking-widest text-sm uppercase">Agendar Avaliação</a>
                <div class="pt-4 border-t border-[#3d322b]">
                    <span class="text-[10px] text-gray-500 tracking-[0.3em] uppercase">CRO 150599-SP</span>
                </div>
            </div>
        </div>
        <footer class="mt-16 text-[9px] text-gray-600 tracking-[0.5em] uppercase">JBG Odonto • Estética & Função</footer>
    </div>
</body>
</html>
